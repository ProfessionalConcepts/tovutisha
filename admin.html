<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>TOVUTISHA | Admin Portal</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..900&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "primary": "#002045",
                    "secondary": "#875200",
                    "background": "#f7fafc",
                    "surface": "#ffffff"
            }
          },
        },
      }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        body { font-family: 'Inter', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-[#f7fafc] text-on-background selection:bg-primary/10">
    <aside class="h-screen w-64 fixed left-0 top-0 bg-white border-r border-slate-100 flex flex-col py-6 space-y-2 z-40">
        <div class="text-xl font-black text-primary px-8 mb-8 tracking-tighter uppercase">TOVUTISHA</div>
        <nav class="flex-1 flex flex-col space-y-1 text-sm font-medium">
            <button onclick="showSection('apps')" id="nav-apps" class="flex items-center space-x-3 px-8 py-3 bg-primary/5 text-primary border-r-4 border-primary font-bold">
                <span class="material-symbols-outlined">description</span>
                <span>Applications</span>
            </button>
            <button onclick="showSection('dir')" id="nav-dir" class="flex items-center space-x-3 px-8 py-3 text-slate-500 hover:bg-slate-50">
                <span class="material-symbols-outlined">school</span>
                <span>Directory</span>
            </button>
            <button onclick="showSection('settings')" id="nav-settings" class="flex items-center space-x-3 px-8 py-3 text-slate-500 hover:bg-slate-50">
                <span class="material-symbols-outlined">settings</span>
                <span>Site Settings</span>
            </button>
            <a href="index.html" class="flex items-center space-x-3 px-8 py-3 text-slate-500 hover:bg-slate-50 mt-auto">
                <span class="material-symbols-outlined">logout</span>
                <span>Logout</span>
            </a>
        </nav>
    </aside>

    <main class="ml-64 p-8 lg:p-12">
        <!-- Applications -->
        <div id="section-apps">
            <header class="mb-10"><h1 class="text-4xl font-black tracking-tight text-primary">Applications</h1></header>
            <div class="bg-white rounded-2xl border border-slate-100 overflow-hidden shadow-sm">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 text-[10px] font-bold uppercase tracking-widest text-slate-400">
                        <tr><th class="px-6 py-4">School</th><th class="px-6 py-4 text-right">Action</th></tr>
                    </thead>
                    <tbody id="appsTable" class="divide-y divide-slate-50"></tbody>
                </table>
            </div>
        </div>

        <!-- Directory -->
        <div id="section-dir" class="hidden">
            <header class="mb-10 flex justify-between items-end">
                <h1 class="text-4xl font-black tracking-tight text-primary">Manage Directory</h1>
                <button onclick="openAddModal()" class="bg-primary text-white px-6 py-3 rounded-xl font-bold">Add School</button>
            </header>
            <div class="bg-white rounded-2xl border border-slate-100 overflow-hidden shadow-sm">
                <table class="w-full text-left text-sm">
                    <thead class="bg-slate-50 text-[10px] font-bold uppercase tracking-widest text-slate-400">
                        <tr>
                            <th class="px-6 py-4">Name</th>
                            <th class="px-6 py-4">Type/Curriculum</th>
                            <th class="px-6 py-4">Population</th>
                            <th class="px-6 py-4">Featured</th>
                            <th class="px-6 py-4 text-right">Action</th>
                        </tr>
                    </thead>
                    <tbody id="dirTable" class="divide-y divide-slate-50"></tbody>
                </table>
            </div>
        </div>

        <!-- Site Settings -->
        <div id="section-settings" class="hidden">
            <header class="mb-10"><h1 class="text-4xl font-black tracking-tight text-primary">Site Content Settings</h1></header>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div class="bg-white p-8 rounded-2xl border border-slate-100 shadow-sm">
                    <h2 class="text-lg font-bold text-primary mb-6 uppercase">Hero Content</h2>
                    <form id="heroForm" class="space-y-4">
                        <input name="title" placeholder="Hero Title" class="w-full bg-slate-50 border-none rounded-xl py-3 px-4">
                        <textarea name="subtitle" placeholder="Hero Subtitle" rows="3" class="w-full bg-slate-50 border-none rounded-xl py-3 px-4 resize-none"></textarea>
                        <input name="floatingText" placeholder="Floating Card Text" class="w-full bg-slate-50 border-none rounded-xl py-3 px-4">
                        <button type="submit" class="w-full bg-primary text-white py-4 rounded-xl font-bold">Update Hero</button>
                    </form>
                </div>
                <div class="bg-white p-8 rounded-2xl border border-slate-100 shadow-sm lg:col-span-2">
                    <h2 class="text-lg font-bold text-primary mb-6 uppercase">Schools Directory Settings</h2>
                    <form id="dirSettingsForm" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <textarea name="description" placeholder="Directory Description" rows="3" class="w-full bg-slate-50 border-none rounded-xl py-3 px-4 resize-none"></textarea>
                        <div class="space-y-4">
                            <input name="spotlightTitle" placeholder="Spotlight Title" class="w-full bg-slate-50 border-none rounded-xl py-3 px-4">
                            <textarea name="spotlightText" placeholder="Spotlight Text" rows="2" class="w-full bg-slate-50 border-none rounded-xl py-3 px-4 resize-none"></textarea>
                        </div>
                        <button type="submit" class="md:col-span-2 bg-primary text-white py-4 rounded-xl font-bold">Update Directory Settings</button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <!-- School Modal -->
    <div id="addModal" class="fixed inset-0 bg-primary/40 backdrop-blur-sm z-50 flex items-center justify-center hidden p-6">
        <div class="bg-white rounded-3xl w-full max-w-2xl p-8 space-y-6 max-h-[90vh] overflow-y-auto no-scrollbar">
            <div class="flex justify-between items-center">
                <h2 id="modalTitle" class="text-xl font-black text-primary uppercase">Add School</h2>
                <button onclick="closeModal()" class="text-slate-400 hover:text-primary"><span class="material-symbols-outlined">close</span></button>
            </div>
            <form id="addForm" class="space-y-6">
                <input type="hidden" name="editIndex" id="editIndex" value="-1">
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold uppercase text-slate-400">School Name</label>
                        <input name="name" class="w-full bg-slate-50 border-none rounded-xl py-3 px-4" required>
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold uppercase text-slate-400">School Portfolio URL</label>
                        <input name="portfolio" placeholder="https://..." class="w-full bg-slate-50 border-none rounded-xl py-3 px-4">
                    </div>
                </div>
                <div class="grid grid-cols-3 gap-4">
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold uppercase text-slate-400">Status</label>
                        <select name="type" class="w-full bg-slate-50 border-none rounded-xl py-3 px-4">
                            <option>Public</option><option>Private</option><option>International</option>
                        </select>
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold uppercase text-slate-400">Curriculum</label>
                        <select name="curriculum" class="w-full bg-slate-50 border-none rounded-xl py-3 px-4">
                            <option>CBC</option><option>8-4-4</option><option>International</option>
                        </select>
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold uppercase text-slate-400">Population</label>
                        <input name="population" type="number" class="w-full bg-slate-50 border-none rounded-xl py-3 px-4" placeholder="e.g. 1200">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold uppercase text-slate-400">Cover Photo URL</label>
                        <input name="photo" placeholder="https://..." class="w-full bg-slate-50 border-none rounded-xl py-3 px-4">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold uppercase text-slate-400">Logo/Profile URL</label>
                        <input name="logo" placeholder="https://..." class="w-full bg-slate-50 border-none rounded-xl py-3 px-4">
                    </div>
                </div>
                <div class="grid grid-cols-3 gap-4">
                    <div class="space-y-1"><label class="text-[10px] font-bold uppercase text-slate-400">County</label><input name="county" class="w-full bg-slate-50 border-none rounded-xl py-3 px-4" required></div>
                    <div class="space-y-1"><label class="text-[10px] font-bold uppercase text-slate-400">Map Lat</label><input name="lat" placeholder="-1.286" class="w-full bg-slate-50 border-none rounded-xl py-3 px-4"></div>
                    <div class="space-y-1"><label class="text-[10px] font-bold uppercase text-slate-400">Map Lng</label><input name="lng" placeholder="36.817" class="w-full bg-slate-50 border-none rounded-xl py-3 px-4"></div>
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-bold uppercase text-slate-400">Academic Excellence Highlights</label>
                    <textarea name="excellence" rows="3" class="w-full bg-slate-50 border-none rounded-xl py-3 px-4 resize-none"></textarea>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold uppercase text-slate-400">Exam Results Photo URL</label>
                        <input name="resultsPhoto" placeholder="https://..." class="w-full bg-slate-50 border-none rounded-xl py-3 px-4">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold uppercase text-slate-400">Exam Results Doc URL (PDF/Excel)</label>
                        <input name="resultsDoc" placeholder="https://..." class="w-full bg-slate-50 border-none rounded-xl py-3 px-4">
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <input type="checkbox" name="featured" id="feat" class="rounded text-primary">
                    <label for="feat" class="text-sm font-bold text-slate-600">Feature on Home</label>
                </div>
                <button type="submit" class="w-full bg-primary text-white py-4 rounded-xl font-bold shadow-lg">Save School Details</button>
            </form>
        </div>
    </div>

    <script>
        function showSection(s) {
            ['apps', 'dir', 'settings'].forEach(id => {
                document.getElementById('section-'+id).classList.toggle('hidden', id !== s);
                document.getElementById('nav-'+id).className = id === s ? 'flex items-center space-x-3 px-8 py-3 bg-primary/5 text-primary border-r-4 border-primary font-bold' : 'flex items-center space-x-3 px-8 py-3 text-slate-500 hover:bg-slate-50';
            });
            if(s === 'apps') renderApps(); else if(s === 'dir') renderDir(); else loadSettings();
        }
        
        function openAddModal(editIdx = -1) {
            const form = document.getElementById('addForm');
            form.reset();
            document.getElementById('editIndex').value = editIdx;
            document.getElementById('modalTitle').innerText = editIdx === -1 ? 'Add School' : 'Edit School';
            
            if (editIdx !== -1) {
                const s = JSON.parse(localStorage.getItem('schools') || '[]')[editIdx];
                form.name.value = s.name;
                form.website.value = s.website || '';
                form.type.value = s.type || 'Public';
                form.curriculum.value = s.curriculum;
                form.population.value = s.population || '';
                form.photo.value = s.photo || '';
                form.logo.value = s.logo || '';
                form.county.value = s.county;
                form.lat.value = s.lat || '';
                form.lng.value = s.lng || '';
                form.excellence.value = s.excellence || '';
                form.resultsPhoto.value = s.resultsPhoto || '';
                form.resultsDoc.value = s.resultsDoc || '';
                document.getElementById('feat').checked = s.featured;
            }
            document.getElementById('addModal').classList.remove('hidden');
        }
        
        function closeModal() { document.getElementById('addModal').classList.add('hidden'); }

        function renderDir() {
            const s = JSON.parse(localStorage.getItem('schools') || '[]');
            document.getElementById('dirTable').innerHTML = s.map((sch, i) => `
                <tr class="hover:bg-slate-50">
                    <td class="px-6 py-4 font-bold text-primary">${sch.name}</td>
                    <td class="px-6 py-4 text-xs font-medium text-slate-500">${sch.type} / ${sch.curriculum}</td>
                    <td class="px-6 py-4 font-bold text-slate-600">${sch.population || 'N/A'}</td>
                    <td class="px-6 py-4"><input type="checkbox" ${sch.featured?'checked':''} onchange="toggleFeat(${i})"></td>
                    <td class="px-6 py-4 text-right space-x-3">
                        <button onclick="openAddModal(${i})" class="text-primary font-bold text-xs hover:underline">Edit</button>
                        <button onclick="del(${i})" class="text-red-500 font-bold text-xs hover:underline">Delete</button>
                    </td>
                </tr>`).join('');
        }

        document.getElementById('addForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const fd = new FormData(this);
            const idx = parseInt(fd.get('editIndex'));
            const s = JSON.parse(localStorage.getItem('schools') || '[]');
            
            const schoolData = {
                name: fd.get('name'),
                website: fd.get('website'),
                type: fd.get('type'),
                curriculum: fd.get('curriculum'),
                population: fd.get('population'),
                photo: fd.get('photo'),
                logo: fd.get('logo'),
                county: fd.get('county'),
                lat: fd.get('lat'),
                lng: fd.get('lng'),
                excellence: fd.get('excellence'),
                resultsPhoto: fd.get('resultsPhoto'),
                resultsDoc: fd.get('resultsDoc'),
                featured: document.getElementById('feat').checked
            };

            if (idx === -1) s.push(schoolData); else s[idx] = schoolData;
            
            localStorage.setItem('schools', JSON.stringify(s));
            closeModal(); renderDir();
        });

        function renderApps() {
            const apps = JSON.parse(localStorage.getItem('applications') || '[]');
            document.getElementById('appsTable').innerHTML = apps.map((a, i) => `
                <tr class="hover:bg-slate-50">
                    <td class="px-6 py-4">
                        <div class="font-bold text-primary">${a.schoolName}</div>
                        <div class="flex gap-2 mt-1">
                            ${a.portfolio ? `<a href="${a.portfolio}" target="_blank" class="text-[9px] bg-blue-100 text-blue-700 px-2 py-0.5 rounded font-bold uppercase">Portfolio</a>` : ''}
                            ${a.resultsDoc ? `<a href="${a.resultsDoc}" target="_blank" class="text-[9px] bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded font-bold uppercase">Results</a>` : ''}
                        </div>
                    </td>
                    <td class="px-6 py-4 text-right"><button onclick="approve(${i})" class="text-primary font-bold text-xs underline">Approve</button></td>
                </tr>`).join('');
        }
        
        function approve(i) {
            const apps = JSON.parse(localStorage.getItem('applications') || '[]');
            const a = apps.splice(i, 1)[0];
            const s = JSON.parse(localStorage.getItem('schools') || '[]');
            s.push({ 
                name: a.schoolName, 
                curriculum: a.curriculum, 
                type: a.schoolType, 
                county: a.county, 
                excellence: a.message, 
                portfolio: a.portfolio,
                resultsDoc: a.resultsDoc,
                featured: false 
            });
            localStorage.setItem('applications', JSON.stringify(apps));
            localStorage.setItem('schools', JSON.stringify(s));
            renderApps();
        }

        function toggleFeat(i) {
            const s = JSON.parse(localStorage.getItem('schools') || '[]');
            s[i].featured = !s[i].featured;
            localStorage.setItem('schools', JSON.stringify(s));
        }
        
        function del(i) {
            if(confirm('Delete school?')) {
                const s = JSON.parse(localStorage.getItem('schools') || '[]');
                s.splice(i, 1);
                localStorage.setItem('schools', JSON.stringify(s));
                renderDir();
            }
        }

        function loadSettings() {
            const data = JSON.parse(localStorage.getItem('homeContent') || '{}');
            if(data.hero) {
                const f = document.getElementById('heroForm');
                f.title.value = data.hero.title; f.subtitle.value = data.hero.subtitle; f.floatingText.value = data.hero.floatingText;
            }
            const dirData = JSON.parse(localStorage.getItem('directorySettings') || '{}');
            const df = document.getElementById('dirSettingsForm');
            df.description.value = dirData.description || '';
            df.spotlightTitle.value = dirData.spotlightTitle || '';
            df.spotlightText.value = dirData.spotlightText || '';
        }

        document.getElementById('heroForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const fd = new FormData(this);
            const data = JSON.parse(localStorage.getItem('homeContent') || '{}');
            data.hero = { title: fd.get('title'), subtitle: fd.get('subtitle'), floatingText: fd.get('floatingText') };
            localStorage.setItem('homeContent', JSON.stringify(data));
            alert('Hero updated!');
        });

        document.getElementById('dirSettingsForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const fd = new FormData(this);
            const data = { description: fd.get('description'), spotlightTitle: fd.get('spotlightTitle'), spotlightText: fd.get('spotlightText') };
            localStorage.setItem('directorySettings', JSON.stringify(data));
            alert('Directory settings updated!');
        });

        renderApps();
    </script>
</body>
</html>
