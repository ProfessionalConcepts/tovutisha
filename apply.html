<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Apply - TOVUTISHA</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "primary": "#002045",
                    "secondary": "#875200",
                    "background": "#f7fafc",
                    "surface": "#ffffff"
            }
          },
        },
      }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        body { font-family: 'Inter', sans-serif; }
        .glass-nav { backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); }
    </style>
</head>
<body class="bg-[#f7fafc] text-on-surface">
    <nav class="sticky top-0 z-50 glass-nav bg-white/80 w-full border-b border-slate-100">
        <div class="flex justify-between items-center px-8 py-4 max-w-7xl mx-auto w-full">
            <div class="text-xl font-black tracking-tighter text-primary uppercase"><a href="index.html">TOVUTISHA</a></div>
            <div class="flex items-center space-x-8 font-inter text-sm font-bold">
                <a class="text-slate-600 hover:text-primary transition-colors" href="index.html">Home</a>
                <a href="login.html" class="bg-slate-100 text-primary px-4 py-2 rounded-lg">Logout</a>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-8 py-12 md:py-20">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-16 items-start">
            <div class="lg:col-span-5 space-y-12">
                <header class="space-y-6">
                    <h1 class="text-5xl md:text-6xl font-black text-primary tracking-tight leading-[1.1]">Incorporate Your School into TOVUTISHA</h1>
                    <div class="inline-flex items-center px-4 py-2 bg-slate-100 text-primary rounded-full text-xs font-bold tracking-widest uppercase">User Portal</div>
                </header>
                <div class="space-y-8">
                    <div class="relative group p-8 rounded-xl bg-white border border-slate-100 transition-all">
                        <div class="flex items-start gap-4">
                            <span class="material-symbols-outlined text-secondary text-3xl">verified</span>
                            <div>
                                <h3 class="text-lg font-bold text-primary mb-1">MMUST Partner Endorsement</h3>
                                <p class="text-slate-500 leading-relaxed text-sm">Gain institutional credibility through our direct partnership.</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-7">
                <div class="bg-white p-8 md:p-12 rounded-2xl shadow-sm border border-slate-100">
                    <form id="incorporateForm" class="space-y-8">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                            <div class="space-y-2">
                                <label class="text-xs font-bold uppercase tracking-widest text-slate-400">School Name</label>
                                <input required name="schoolName" class="w-full bg-slate-50 border-b-2 border-slate-200 border-t-0 border-x-0 focus:border-secondary focus:ring-0 py-3 px-0">
                            </div>
                            <div class="space-y-2">
                                <label class="text-xs font-bold uppercase tracking-widest text-slate-400">School Type</label>
                                <select required name="schoolType" class="w-full bg-slate-50 border-b-2 border-slate-200 border-t-0 border-x-0 focus:border-secondary focus:ring-0 py-3 px-0">
                                    <option>Public</option>
                                    <option>Private</option>
                                    <option>International</option>
                                </select>
                            </div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                            <div class="space-y-2">
                                <label class="text-xs font-bold uppercase tracking-widest text-slate-400">County</label>
                                <input required name="county" class="w-full bg-slate-50 border-b-2 border-slate-200 border-t-0 border-x-0 focus:border-secondary focus:ring-0 py-3 px-0">
                            </div>
                            <div class="space-y-2">
                                <label class="text-xs font-bold uppercase tracking-widest text-slate-400">Curriculum</label>
                                <select required name="curriculum" class="w-full bg-slate-50 border-b-2 border-slate-200 border-t-0 border-x-0 focus:border-secondary focus:ring-0 py-3 px-0">
                                    <option>CBC</option>
                                    <option>International</option>
                                    <option>8-4-4</option>
                                </select>
                            </div>
                        </div>
                        <div class="space-y-2">
                            <label class="text-xs font-bold uppercase tracking-widest text-slate-400">Message / Academic Excellence Highlights</label>
                            <textarea name="message" rows="4" class="w-full bg-slate-50 border-b-2 border-slate-200 border-t-0 border-x-0 focus:border-secondary focus:ring-0 py-3 px-0 resize-none"></textarea>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                            <div class="space-y-2">
                                <label class="text-xs font-bold uppercase tracking-widest text-slate-400">School Portfolio (Document URL)</label>
                                <input name="portfolio" placeholder="Link to PDF/Portfolio" class="w-full bg-slate-50 border-b-2 border-slate-200 border-t-0 border-x-0 focus:border-secondary focus:ring-0 py-3 px-0">
                            </div>
                            <div class="space-y-2">
                                <label class="text-xs font-bold uppercase tracking-widest text-slate-400">Results Performance (Document URL)</label>
                                <input name="resultsDoc" placeholder="Link to Exam Results PDF" class="w-full bg-slate-50 border-b-2 border-slate-200 border-t-0 border-x-0 focus:border-secondary focus:ring-0 py-3 px-0">
                            </div>
                        </div>
                        <button type="submit" class="w-full bg-primary text-white font-bold py-5 rounded-xl shadow-lg shadow-primary/20 transition-all group">
                            Submit Application
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </main>
    <script>
        document.getElementById('incorporateForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const fd = new FormData(this);
            const applications = JSON.parse(localStorage.getItem('applications') || '[]');
            applications.push({
                schoolName: fd.get('schoolName'),
                schoolType: fd.get('schoolType'),
                county: fd.get('county'),
                curriculum: fd.get('curriculum'),
                message: fd.get('message'),
                portfolio: fd.get('portfolio'),
                resultsDoc: fd.get('resultsDoc'),
                date: new Date().toLocaleDateString()
            });
            localStorage.setItem('applications', JSON.stringify(applications));
            alert('Application submitted! Redirecting to home...');
            location.href = 'index.html';
        });
    </script>
</body>
</html>
