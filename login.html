<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>TOVUTISHA | Portal Access</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..900&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": { "primary": "#002045", "secondary": "#875200", "background": "#f7fafc", "surface": "#ffffff" }
          },
        },
      }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .glass-card { backdrop-filter: blur(16px); background: rgba(255, 255, 255, 0.9); }
    </style>
</head>
<body class="bg-[#f7fafc] min-h-screen flex items-center justify-center p-6 font-inter">
    <div class="w-full max-w-md space-y-8">
        <div class="text-center space-y-4">
            <a href="index.html"><img src="logo/logo.png" alt="TOVUTISHA" class="h-12 w-auto mx-auto"></a>
            <h1 id="auth-title" class="text-3xl font-black text-primary uppercase tracking-tighter">Welcome Back</h1>
            <p id="auth-subtitle" class="text-slate-500 font-medium">Access your institutional command center.</p>
        </div>

        <div class="glass-card p-10 rounded-[2.5rem] border border-slate-100 shadow-2xl">
            <form id="auth-form" class="space-y-6">
                <div class="space-y-2">
                    <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 px-1">Email Address</label>
                    <input type="email" id="email" class="w-full bg-slate-50 border-none rounded-2xl py-4 px-6 focus:ring-2 focus:ring-primary/10" required>
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 px-1">Security Key</label>
                    <input type="password" id="password" class="w-full bg-slate-50 border-none rounded-2xl py-4 px-6 focus:ring-2 focus:ring-primary/10" required>
                </div>
                
                <button type="submit" id="submit-btn" class="w-full bg-primary text-white py-5 rounded-2xl font-black uppercase tracking-widest shadow-xl shadow-primary/20 hover:scale-[1.02] transition-all">
                    Initialize Access
                </button>
            </form>

            <div class="mt-8 text-center">
                <button id="toggle-auth" class="text-[10px] font-black uppercase tracking-widest text-secondary hover:text-primary transition-colors">
                    Need an account? Create one
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './js/firebase-config.js';
        import { signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
        import { doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        let isLogin = true;
        const toggleBtn = document.getElementById('toggle-auth');
        const title = document.getElementById('auth-title');
        const subtitle = document.getElementById('auth-subtitle');
        const submitBtn = document.getElementById('submit-btn');

        toggleBtn.onclick = () => {
            isLogin = !isLogin;
            title.innerText = isLogin ? 'Welcome Back' : 'Create Account';
            subtitle.innerText = isLogin ? 'Access your institutional command center.' : 'Register your school for the TOVUTISHA initiative.';
            submitBtn.innerText = isLogin ? 'Initialize Access' : 'Register Institution';
            toggleBtn.innerText = isLogin ? 'Need an account? Create one' : 'Already have an account? Login';
        };

        document.getElementById('auth-form').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;

            try {
                if(isLogin) {
                    const cred = await signInWithEmailAndPassword(auth, email, pass);
                    const snap = await getDoc(doc(db, "users", cred.user.uid));
                    if(snap.exists() && snap.data().role === 'admin') window.location.href = 'admin.html';
                    else window.location.href = 'apply.html';
                } else {
                    const cred = await createUserWithEmailAndPassword(auth, email, pass);
                    await setDoc(doc(db, "users", cred.user.uid), {
                        email: email,
                        role: 'user',
                        createdAt: new Date().toISOString()
                    });
                    window.location.href = 'apply.html';
                }
            } catch (err) {
                alert(err.message);
            }
        };
    </script>
</body>
</html>
