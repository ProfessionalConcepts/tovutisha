<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>TOVUTISHA | Schools Directory</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#001e40", "secondary": "#0f6d39", "surface": "#f7f9fb", "on-surface": "#191c1e"
                    },
                    "fontFamily": { "headline": ["Manrope"], "body": ["Inter"] }
                },
            }
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
        .glass-nav { backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); }
        #map { height: 600px; width: 100%; border-radius: 1.5rem; display: none; }
    </style>
</head>
<body class="bg-surface font-body text-on-surface antialiased">
<nav class="fixed top-0 w-full z-50 bg-white/80 glass-nav flex justify-between items-center px-8 py-4 border-b border-slate-200/50">
    <div class="flex items-center gap-12">
        <span class="text-2xl font-extrabold font-manrope bg-gradient-to-br from-blue-900 to-blue-700 bg-clip-text text-transparent uppercase"><a href="index.html">TOVUTISHA</a></span>
        <div class="hidden md:flex gap-8 items-center font-manrope tracking-tight text-sm font-semibold">
            <a class="text-slate-500 hover:text-primary transition-colors" href="index.html">Home</a>
            <a class="text-blue-900 border-b-2 border-primary pb-1" href="schools.html">Schools</a>
            <a class="text-slate-500 hover:text-primary transition-colors" href="#">About</a>
        </div>
    </div>
    <div class="flex items-center gap-4">
        <button onclick="location.href='login.html'" class="bg-primary text-white px-6 py-2 rounded-lg font-bold text-xs uppercase tracking-widest hover:opacity-90 transition-opacity">Get Started</button>
    </div>
</nav>

<main class="pt-24 pb-12 px-8 max-w-screen-2xl mx-auto">
    <header class="mb-12">
        <h1 class="font-headline text-5xl font-extrabold text-primary mb-4 tracking-tight">Schools Directory</h1>
        <p id="page-description" class="text-on-surface-variant text-lg max-w-2xl leading-relaxed">Explore Kenyan institutions across the 47 counties.</p>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
        <aside class="lg:col-span-3 space-y-6 sticky top-28">
            <div class="bg-slate-100 p-6 rounded-2xl space-y-8">
                <div>
                    <label class="block text-primary font-bold text-sm uppercase tracking-wider mb-4">View Mode</label>
                    <div class="flex p-1 bg-white rounded-xl">
                        <button onclick="setView('grid')" id="btn-grid" class="flex-1 py-2 rounded-lg bg-primary text-white font-bold text-xs">GRID</button>
                        <button onclick="setView('map')" id="btn-map" class="flex-1 py-2 rounded-lg text-slate-500 font-bold text-xs">MAP</button>
                    </div>
                </div>
                <div>
                    <label class="block text-primary font-bold text-sm uppercase tracking-wider mb-4">Location</label>
                    <select id="filterCounty" class="w-full bg-white border-none rounded-xl text-sm py-3 px-4 focus:ring-2 focus:ring-primary/20">
                        <option value="all">All 47 Counties</option>
                        <option>Nairobi</option><option>Mombasa</option><option>Kiambu</option>
                    </select>
                </div>
                <button onclick="renderSchools()" class="w-full bg-primary text-white py-4 rounded-xl font-bold text-sm shadow-lg shadow-primary/20">Apply Filters</button>
            </div>
            <div id="spotlight-card" class="bg-primary-container text-white p-6 rounded-2xl relative overflow-hidden">
                <div class="relative z-10">
                    <span class="inline-block px-2 py-1 bg-secondary text-white text-[10px] font-bold uppercase rounded mb-3">Spotlight</span>
                    <h4 id="spotlight-title" class="font-headline font-bold text-lg mb-2">Academic Excellence</h4>
                    <p id="spotlight-text" class="text-sm opacity-80 mb-4">Discover institutions ranked top in the latest indices.</p>
                </div>
            </div>
        </aside>

        <div class="lg:col-span-9 space-y-8">
            <div id="schoolsGrid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6"></div>
            <div id="map"></div>
        </div>
    </div>
</main>

<!-- Excellence Modal -->
<div id="excellenceModal" class="fixed inset-0 bg-primary/40 backdrop-blur-sm z-[60] flex items-center justify-center hidden p-6">
    <div class="bg-white rounded-3xl w-full max-w-2xl p-8 space-y-6 max-h-[90vh] overflow-y-auto">
        <div class="flex justify-between items-center">
            <h2 id="exc-school-name" class="text-2xl font-black text-primary uppercase">Academic Excellence</h2>
            <button onclick="closeExcModal()" class="text-slate-400 hover:text-primary"><span class="material-symbols-outlined">close</span></button>
        </div>
        <div id="exc-content" class="space-y-6">
            <p id="exc-desc" class="text-slate-600 leading-relaxed"></p>
            <div id="exc-results-container" class="space-y-4">
                <h3 class="font-bold text-primary uppercase text-sm tracking-widest">Exam Results Analysis</h3>
                <img id="exc-photo" class="w-full rounded-2xl border border-slate-100 shadow-sm" src="">
                <a id="exc-doc" href="#" target="_blank" class="flex items-center gap-3 p-4 bg-slate-50 rounded-2xl hover:bg-slate-100 transition-all border border-slate-200">
                    <span class="material-symbols-outlined text-primary">description</span>
                    <div>
                        <div class="font-bold text-sm text-primary">Download Performance Report</div>
                        <div class="text-[10px] text-slate-400 uppercase font-bold">PDF / EXCEL DOCUMENT</div>
                    </div>
                </a>
            </div>
        </div>
    </div>
</div>

<script>
    let map;
    function setView(v) {
        document.getElementById('schoolsGrid').style.display = v === 'grid' ? 'grid' : 'none';
        document.getElementById('map').style.display = v === 'map' ? 'block' : 'none';
        document.getElementById('btn-grid').className = v === 'grid' ? 'flex-1 py-2 rounded-lg bg-primary text-white font-bold text-xs' : 'flex-1 py-2 rounded-lg text-slate-500 font-bold text-xs';
        document.getElementById('btn-map').className = v === 'map' ? 'flex-1 py-2 rounded-lg bg-primary text-white font-bold text-xs' : 'flex-1 py-2 rounded-lg text-slate-500 font-bold text-xs';
        if(v === 'map') initMap();
    }

    function initMap() {
        if(map) return;
        map = L.map('map').setView([-1.286, 36.817], 7);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        const schools = JSON.parse(localStorage.getItem('schools') || '[]');
        schools.forEach(s => {
            if(s.lat && s.lng) {
                L.marker([s.lat, s.lng]).addTo(map).bindPopup(`<b>${s.name}</b><br>${s.county} County`);
            }
        });
    }

    function openExcModal(idx) {
        const s = JSON.parse(localStorage.getItem('schools') || '[]')[idx];
        document.getElementById('exc-school-name').innerText = s.name;
        document.getElementById('exc-desc').innerText = s.excellence || 'No highlights provided.';
        const photo = document.getElementById('exc-photo');
        if(s.resultsPhoto) { photo.src = s.resultsPhoto; photo.style.display = 'block'; } else { photo.style.display = 'none'; }
        const doc = document.getElementById('exc-doc');
        if(s.resultsDoc) { doc.href = s.resultsDoc; doc.style.display = 'flex'; } else { doc.style.display = 'none'; }
        document.getElementById('excellenceModal').classList.remove('hidden');
    }
    function closeExcModal() { document.getElementById('excellenceModal').classList.add('hidden'); }

    function renderSchools() {
        const schools = JSON.parse(localStorage.getItem('schools') || '[]');
        const grid = document.getElementById('schoolsGrid');
        const settings = JSON.parse(localStorage.getItem('directorySettings') || '{}');
        if(settings.description) document.getElementById('page-description').innerText = settings.description;
        if(settings.spotlightTitle) document.getElementById('spotlight-title').innerText = settings.spotlightTitle;
        if(settings.spotlightText) document.getElementById('spotlight-text').innerText = settings.spotlightText;

        if (schools.length === 0) {
            grid.innerHTML = '<div class="col-span-full p-12 text-center bg-white rounded-2xl border border-slate-100 text-slate-400">Our directory is being updated.</div>';
            return;
        }

        grid.innerHTML = schools.map((s, i) => `
            <div class="bg-white rounded-3xl overflow-hidden shadow-sm hover:shadow-xl transition-all group border border-slate-100">
                <div class="h-40 bg-slate-100 relative">
                    <img class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105" src="${s.photo || 'https://images.unsplash.com/photo-1546410531-bb4caa6b424d?w=800'}">
                    <div class="absolute top-4 right-4 bg-primary text-white px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest">${s.type}</div>
                </div>
                <div class="p-8 -mt-10 relative z-10">
                    <div class="w-20 h-20 rounded-2xl bg-white shadow-xl p-2 mb-4 border border-slate-100">
                        <img class="w-full h-full object-contain rounded-xl" src="${s.logo || 'https://lh3.googleusercontent.com/aida-public/AB6AXuCzHiCWTuySGN9LlZf8sSngBc2UZ2UscN4t4nbNM5TKkmEX7c9H0O5hNP0uNcy8eJwfRqKwNpNh5Mh3WoiG6IrVtyWNf4gJ-PQ7vXQGcjqyVn-J2Lm5KZhEgebeTOMO4YSG0XymKLIEDrPwTt4Wsir6LRACRnmTiLi0el0iC9WEfjRLJ77TYFkm1WDyBJsFCXpxhzWzsMY_CaUO0bJs2hOTO1knFTEEgNbGq-2KZBtmPqiLna2HNlMJYNNzXOKPTf9aqhv4J2Qc3Kk'}">
                    </div>
                    <h3 class="font-headline font-bold text-xl text-primary mb-1">${s.name}</h3>
                    <div class="flex items-center gap-2 text-slate-500 text-xs mb-6">
                        <span class="material-symbols-outlined text-sm">group</span> ${s.population || '---'} Students • ${s.county} County
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="openExcModal(${i})" class="bg-slate-100 text-primary py-3 rounded-xl text-xs font-bold hover:bg-slate-200 transition-all uppercase tracking-wider">Academic Excellence</button>
                        <a href="${s.website || '#'}" target="_blank" class="bg-primary text-white py-3 rounded-xl text-xs font-bold text-center hover:opacity-90 transition-all uppercase tracking-wider">Visit Website</a>
                    </div>
                </div>
            </div>
        `).join('');
    }
    renderSchools();
</script>
</body>
</html>
