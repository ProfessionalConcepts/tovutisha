<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Schools Directory | TOVUTISHA</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#001e40", "secondary": "#0f6d39", "surface": "#f7f9fb", "on-surface": "#191c1e"
                    },
                    "fontFamily": { "headline": ["Manrope"], "body": ["Inter"] }
                },
            }
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
        .glass-nav { backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); }
        #map { height: 600px; width: 100%; border-radius: 1.5rem; display: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-surface font-body text-on-surface antialiased selection:bg-primary/10">
<nav class="sticky top-0 z-50 glass-nav bg-white/80 dark:bg-slate-950/80 w-full border-b border-slate-100">
    <div class="flex justify-between items-center px-8 py-4 max-w-7xl mx-auto w-full font-inter text-sm tracking-tight">
        <div class="text-xl font-black tracking-tighter text-primary uppercase"><a href="index.html"><img src="logo/logo.png" alt="TOVUTISHA" class="h-10 w-auto"></a></div>
        <div class="hidden md:flex items-center space-x-8 font-bold">
            <a class="text-slate-600 hover:text-primary transition-colors" href="index.html">Home</a>
            <a class="text-primary border-b-2 border-primary pb-1" href="schools.html">Schools</a>
            <a class="text-slate-600 hover:text-primary transition-colors" href="about.html">About</a>
        </div>
        <div class="flex items-center space-x-4">
            <div class="relative hidden lg:block">
                <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm">search</span>
                <input id="mainSearch" oninput="renderSchools()" class="bg-slate-50 border border-slate-200 rounded-full py-1.5 pl-10 pr-4 text-xs focus:ring-2 focus:ring-primary/20 w-48 outline-none" placeholder="Search schools..." type="text"/>
            </div>
            <button onclick="toggleMobileMenu()" class="md:hidden text-primary"><span class="material-symbols-outlined" id="menu-icon">menu</span></button>
        </div>
    </div>
    <div id="mobile-menu" class="hidden md:hidden bg-white border-b border-slate-100 p-6 space-y-4 shadow-xl">
        <a class="block font-bold text-slate-600" href="index.html">Home</a>
        <a class="block font-bold text-primary" href="schools.html">Schools</a>
        <a class="block font-bold text-slate-600" href="about.html">About</a>
        <hr class="border-slate-50">
        <button onclick="location.href='login.html'" class="w-full bg-primary text-white py-3 rounded-xl font-bold uppercase tracking-widest text-[10px]">Portal Access</button>
    </div>
</nav>

<main class="pt-12 pb-24 px-8 max-w-screen-2xl mx-auto">
    <header class="mb-12">
        <h1 class="font-headline text-5xl font-black text-primary mb-4 tracking-tighter uppercase">Institutional Directory</h1>
        <p class="text-slate-500 text-lg max-w-2xl font-medium leading-relaxed">Discover Kenyan institutions across the 47 counties of the republic.</p>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-12 items-start">
        <aside class="lg:col-span-3 space-y-6 sticky top-28">
            <div class="bg-white p-8 rounded-[2rem] space-y-10 border border-slate-100 shadow-sm">
                <div>
                    <label class="block text-primary font-black text-[10px] uppercase tracking-[0.2em] mb-4">View Architecture</label>
                    <div class="flex p-1.5 bg-slate-50 rounded-2xl">
                        <button onclick="setView('grid')" id="btn-grid" class="flex-1 py-3 rounded-xl bg-primary text-white font-black text-[10px] tracking-widest uppercase transition-all">GRID</button>
                        <button onclick="setView('map')" id="btn-map" class="flex-1 py-3 rounded-xl text-slate-400 font-black text-[10px] tracking-widest uppercase transition-all">MAP</button>
                    </div>
                </div>

                <div class="space-y-6">
                    <div>
                        <label class="block text-primary font-black text-[10px] uppercase tracking-[0.2em] mb-3 px-1">Location Range</label>
                        <select id="filterCounty" onchange="renderSchools()" class="w-full bg-slate-50 border-none rounded-xl text-xs font-bold py-4 px-5 focus:ring-2 focus:ring-primary/20 appearance-none">
                            <option value="all">All 47 Counties</option>
                            <option>Nairobi</option><option>Mombasa</option><option>Kiambu</option><option>Nakuru</option><option>Kisumu</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-primary font-black text-[10px] uppercase tracking-[0.2em] mb-3 px-1">Operational Model</label>
                        <select id="filterType" onchange="renderSchools()" class="w-full bg-slate-50 border-none rounded-xl text-xs font-bold py-4 px-5 focus:ring-2 focus:ring-primary/20 appearance-none">
                            <option value="all">All Statuses</option>
                            <option>Public</option><option>Private</option><option>International</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-primary font-black text-[10px] uppercase tracking-[0.2em] mb-3 px-1">Curriculum</label>
                        <select id="filterCurriculum" onchange="renderSchools()" class="w-full bg-slate-50 border-none rounded-xl text-xs font-bold py-4 px-5 focus:ring-2 focus:ring-primary/20 appearance-none">
                            <option value="all">All Curricula</option>
                            <option>CBC</option><option>8-4-4</option><option>International</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-primary font-black text-[10px] uppercase tracking-[0.2em] mb-3 px-1">Gender Registry</label>
                        <select id="filterGender" onchange="renderSchools()" class="w-full bg-slate-50 border-none rounded-xl text-xs font-bold py-4 px-5 focus:ring-2 focus:ring-primary/20 appearance-none">
                            <option value="all">Mixed & Single Sex</option>
                            <option>Boys Only</option><option>Girls Only</option><option>Mixed</option>
                        </select>
                    </div>
                </div>

                <button onclick="resetFilters()" class="w-full text-slate-300 font-black text-[9px] uppercase tracking-[0.3em] hover:text-primary transition-colors pt-4 border-t border-slate-50">Reset Search Parameters</button>
            </div>
        </aside>

        <div class="lg:col-span-9">
            <div id="schoolsGrid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8">
                <!-- Dynamic Content -->
            </div>
            <div id="map" class="shadow-2xl border border-slate-100"></div>
        </div>
    </div>
</main>

<footer class="bg-white py-16 px-8 border-t border-slate-100">
    <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-12">
        <div class="flex flex-col gap-4">
            <img src="logo/logo.png" alt="TOVUTISHA" class="h-10 w-auto">
            <p class="font-inter text-[10px] font-black tracking-[0.2em] uppercase text-blue-900">© 2024 TOVUTISHA. ALL RIGHTS RESERVED.</p>
        </div>
        <div class="flex gap-12 font-black text-[10px] uppercase tracking-[0.3em] text-slate-400">
            <a class="hover:text-primary transition-colors" href="privacy.html">Privacy</a>
            <a class="hover:text-primary transition-colors" href="terms.html">Terms</a>
        </div>
    </div>
</footer>

<script type="module">
    import { db } from './js/firebase-config.js';
    import { collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

    let map;
    let allSchools = [];

    window.toggleMobileMenu = () => {
        const menu = document.getElementById('mobile-menu');
        const icon = document.getElementById('menu-icon');
        menu.classList.toggle('hidden');
        icon.innerText = menu.classList.contains('hidden') ? 'menu' : 'close';
    };

    window.setView = (v) => {
        document.getElementById('schoolsGrid').style.display = v === 'grid' ? 'grid' : 'none';
        document.getElementById('map').style.display = v === 'map' ? 'block' : 'none';
        
        const btnGrid = document.getElementById('btn-grid');
        const btnMap = document.getElementById('btn-map');
        
        if(v === 'grid') {
            btnGrid.className = 'flex-1 py-3 rounded-xl bg-primary text-white font-black text-[10px] tracking-widest uppercase';
            btnMap.className = 'flex-1 py-3 rounded-xl text-slate-400 font-black text-[10px] tracking-widest uppercase';
        } else {
            btnMap.className = 'flex-1 py-3 rounded-xl bg-primary text-white font-black text-[10px] tracking-widest uppercase';
            btnGrid.className = 'flex-1 py-3 rounded-xl text-slate-400 font-black text-[10px] tracking-widest uppercase';
            initMap();
        }
    }

    function initMap() {
        if(map) map.remove();
        map = L.map('map').setView([-1.286, 36.817], 7);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        allSchools.forEach(s => {
            if(s.lat && s.lng) {
                L.marker([s.lat, s.lng]).addTo(map).bindPopup(`
                    <div class="p-2">
                        <h4 class="font-black text-primary uppercase text-xs mb-1">${s.name}</h4>
                        <p class="text-[10px] font-bold text-slate-500 uppercase">${s.county} County</p>
                    </div>
                `);
            }
        });
    }

    window.resetFilters = () => {
        document.getElementById('mainSearch').value = '';
        document.getElementById('filterCounty').value = 'all';
        document.getElementById('filterType').value = 'all';
        document.getElementById('filterCurriculum').value = 'all';
        document.getElementById('filterGender').value = 'all';
        window.renderSchools();
    }

    window.renderSchools = () => {
        const grid = document.getElementById('schoolsGrid');
        const q = document.getElementById('mainSearch').value.toLowerCase();
        const county = document.getElementById('filterCounty').value;
        const type = document.getElementById('filterType').value;
        const curriculum = document.getElementById('filterCurriculum').value;
        const gender = document.getElementById('filterGender').value;

        const filtered = allSchools.filter(s => {
            const matchesSearch = s.name.toLowerCase().includes(q);
            const matchesCounty = county === 'all' || s.county === county;
            const matchesType = type === 'all' || s.type === type;
            const matchesCurriculum = curriculum === 'all' || s.curriculum === curriculum;
            const matchesGender = gender === 'all' || s.gender === gender;
            return matchesSearch && matchesCounty && matchesType && matchesCurriculum && matchesGender;
        });

        if(filtered.length === 0) {
            grid.innerHTML = `
                <div class="col-span-full py-32 text-center space-y-4">
                    <span class="material-symbols-outlined text-6xl text-slate-100">manage_search</span>
                    <p class="text-[10px] font-black text-slate-300 uppercase tracking-[0.4em]">No matching institutions found in registry</p>
                </div>
            `;
            return;
        }

        grid.innerHTML = filtered.map(s => `
            <div class="bg-white rounded-[2.5rem] overflow-hidden shadow-sm hover:shadow-2xl transition-all group border border-slate-100 flex flex-col">
                <div class="h-44 bg-slate-50 relative shrink-0 overflow-hidden">
                    <img class="w-full h-full object-cover transition-transform duration-1000 group-hover:scale-110 grayscale group-hover:grayscale-0 opacity-80 group-hover:opacity-100" src="${s.photo || 'https://images.unsplash.com/photo-1546410531-bb4caa6b424d?w=800'}">
                    <div class="absolute top-6 right-6 bg-primary text-white px-4 py-1.5 rounded-full text-[9px] font-black uppercase tracking-widest shadow-2xl">${s.type}</div>
                </div>
                <div class="p-10 -mt-12 relative z-10 flex-1 flex flex-col">
                    <div class="w-20 h-20 rounded-2xl bg-white shadow-2xl p-2 mb-6 border border-slate-50 shrink-0">
                        <img class="w-full h-full object-contain rounded-xl" src="${s.logo || 'https://lh3.googleusercontent.com/aida-public/AB6AXuCzHiCWTuySGN9LlZf8sSngBc2UZ2UscN4t4nbNM5TKkmEX7c9H0O5hNP0uNcy8eJwfRqKwNpNh5Mh3WoiG6IrVtyWNf4gJ-PQ7vXQGcjqyVn-J2Lm5KZhEgebeTOMO4YSG0XymKLIEDrPwTt4Wsir6LRACRnmTiLi0el0iC9WEfjRLJ77TYFkm1WDyBJsFCXpxhzWzsMY_CaUO0bJs2hOTO1knFTEEgNbGq-2KZBtmPqiLna2HNlMJYNNzXOKPTf9aqhv4J2Qc3Kk'}">
                    </div>
                    <h3 class="font-headline font-black text-xl text-primary mb-1 uppercase tracking-tighter leading-none">${s.name}</h3>
                    <div class="text-slate-400 text-[10px] font-black uppercase tracking-widest mb-8">${s.county} County • ${s.curriculum}</div>
                    <a href="${s.website || '#'}" target="_blank" class="mt-auto block bg-primary text-white py-4 rounded-xl text-[10px] font-black text-center hover:shadow-xl transition-all uppercase tracking-[0.2em] shadow-lg shadow-primary/10">Explore Portal</a>
                </div>
            </div>`).join('');
        
        if(map) initMap();
    };

    onSnapshot(collection(db, "schools"), (snap) => {
        allSchools = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        window.renderSchools();
    });
</script>
</body>
</html>
